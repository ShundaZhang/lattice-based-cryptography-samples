<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Two-dimensional lattice generated by two basis vectors</title>
  <desc id="desc">A lattice of points generated by integer combinations of two arrows.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="520" fill="#ffffff"/>
  <rect x="40" y="40" width="560" height="400" fill="url(#grid)"/>
  <line x1="40" y1="240" x2="600" y2="240" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="280" y1="40" x2="280" y2="440" stroke="#94a3b8" stroke-width="1.5"/>

  <g fill="#111827">
    <circle cx="120" cy="360" r="4"/>
    <circle cx="160" cy="320" r="4"/>
    <circle cx="200" cy="280" r="4"/>
    <circle cx="240" cy="240" r="4"/>
    <circle cx="280" cy="200" r="4"/>
    <circle cx="320" cy="160" r="4"/>
    <circle cx="360" cy="120" r="4"/>

    <circle cx="200" cy="400" r="4"/>
    <circle cx="240" cy="360" r="4"/>
    <circle cx="280" cy="320" r="4"/>
    <circle cx="320" cy="280" r="4"/>
    <circle cx="360" cy="240" r="4"/>
    <circle cx="400" cy="200" r="4"/>
    <circle cx="440" cy="160" r="4"/>

    <circle cx="280" cy="440" r="4"/>
    <circle cx="320" cy="400" r="4"/>
    <circle cx="360" cy="360" r="4"/>
    <circle cx="400" cy="320" r="4"/>
    <circle cx="440" cy="280" r="4"/>
    <circle cx="480" cy="240" r="4"/>
    <circle cx="520" cy="200" r="4"/>

    <circle cx="120" cy="280" r="4"/>
    <circle cx="160" cy="240" r="4"/>
    <circle cx="200" cy="200" r="4"/>
    <circle cx="240" cy="160" r="4"/>
    <circle cx="280" cy="120" r="4"/>
    <circle cx="320" cy="80" r="4"/>

    <circle cx="360" cy="440" r="4"/>
    <circle cx="400" cy="400" r="4"/>
    <circle cx="440" cy="360" r="4"/>
    <circle cx="480" cy="320" r="4"/>
    <circle cx="520" cy="280" r="4"/>
    <circle cx="560" cy="240" r="4"/>
  </g>

  <circle cx="240" cy="240" r="7" fill="#059669"/>
  <line x1="240" y1="240" x2="360" y2="200" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <line x1="240" y1="240" x2="320" y2="320" stroke="#dc2626" stroke-width="5" marker-end="url(#arrow-red)"/>
  <text x="365" y="195" font-family="Arial, sans-serif" font-size="20" fill="#2563eb">b1</text>
  <text x="326" y="338" font-family="Arial, sans-serif" font-size="20" fill="#dc2626">b2</text>
  <text x="210" y="226" font-family="Arial, sans-serif" font-size="16" fill="#059669">0</text>

  <rect x="640" y="72" width="210" height="255" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="660" y="112" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0f172a">整数线性组合</text>
  <text x="660" y="155" font-family="Arial, sans-serif" font-size="19" fill="#334155">L(B) = z1*b1 + z2*b2</text>
  <text x="660" y="185" font-family="Arial, sans-serif" font-size="18" fill="#334155">z1, z2 是整数</text>
  <text x="660" y="230" font-family="Arial, sans-serif" font-size="18" fill="#334155">每个黑点都是：</text>
  <text x="660" y="260" font-family="Arial, sans-serif" font-size="18" fill="#334155">向右走 z1 个 b1</text>
  <text x="660" y="290" font-family="Arial, sans-serif" font-size="18" fill="#334155">再走 z2 个 b2</text>
  <text x="60" y="480" font-family="Arial, sans-serif" font-size="18" fill="#475569">格不是连续平面，而是一组离散、重复、无限延伸的点。</text>
</svg>

