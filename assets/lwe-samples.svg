<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Learning With Errors sample generation</title>
  <desc id="desc">Rows of a matrix are dotted with a secret vector and noise is added modulo q.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="50" y="52" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">LWE 样本：线性方程 + 小错误</text>

  <rect x="55" y="105" width="190" height="165" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="78" y="135" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">公开随机向量 a</text>
  <text x="88" y="180" font-family="Arial, sans-serif" font-size="22" fill="#334155">[ 7,  3, 11 ]</text>
  <text x="88" y="220" font-family="Arial, sans-serif" font-size="22" fill="#334155">[ 2, 14,  5 ]</text>
  <text x="88" y="260" font-family="Arial, sans-serif" font-size="22" fill="#334155">[ 9,  1,  6 ]</text>

  <line x1="255" y1="185" x2="335" y2="185" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="350" y="118" width="160" height="135" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="378" y="150" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">秘密向量 s</text>
  <text x="390" y="198" font-family="Arial, sans-serif" font-size="24" fill="#1e3a8a">[4, 8, 1]</text>
  <text x="378" y="232" font-family="Arial, sans-serif" font-size="17" fill="#1e40af">攻击者不知道</text>

  <line x1="520" y1="185" x2="600" y2="185" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="615" y="95" width="225" height="185" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="640" y="130" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">输出 b</text>
  <text x="640" y="168" font-family="Arial, sans-serif" font-size="20" fill="#7c2d12">b = &lt;a, s&gt; + e mod q</text>
  <text x="640" y="210" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">e 是小噪声</text>
  <text x="640" y="242" font-family="Arial, sans-serif" font-size="18" fill="#7c2d12">没有 e 就能解线性方程</text>

  <text x="70" y="340" font-family="Arial, sans-serif" font-size="20" fill="#334155">学习目标：从很多 `(a, b)` 样本中恢复 `s`，或者判断它们不是随机数。</text>
  <text x="70" y="374" font-family="Arial, sans-serif" font-size="20" fill="#334155">困难点：每个等式都被小错误 e 扰动，普通线性代数不再直接可用。</text>
</svg>

